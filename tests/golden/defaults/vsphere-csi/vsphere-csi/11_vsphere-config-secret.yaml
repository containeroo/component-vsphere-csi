apiVersion: v1
kind: Secret
metadata:
  name: vsphere-config-secret
  namespace: vmware-system-csi
stringData:
  csi-vsphere.conf: |
    [Global]
    cluster-distribution = "kind"
    cluster-id = "test-cluster"

    [VirtualCenter "vcsa-01.example.com"]
    datacenters = "DC0"
    insecure-flag = "true"
    password = "changeme"
    port = "443"
    user = "administrator@vsphere.local"
type: Opaque
