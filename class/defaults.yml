---
parameters:
  vsphere_csi:
    namespace: vmware-system-csi
    csidriver_name: csi.vsphere.vmware.com
    config_secret_name: vsphere-config-secret
    feature_states_configmap_name: internal-feature-states.csi.vsphere.vmware.com

    configuration:
      global:
        cluster-id: ${cluster:name}
        cluster-distribution: ${facts:distribution}

    feature_states:
      trigger-csi-fullsync: "false"
      pv-to-backingdiskobjectid-mapping: "false"
      csi-transaction-support: "false"

    images:
      csi_attacher:
        registry: registry.k8s.io
        repository: sig-storage/csi-attacher
        tag: v4.9.0
      csi_resizer:
        registry: registry.k8s.io
        repository: sig-storage/csi-resizer
        tag: v1.12.0
      driver:
        registry: registry.k8s.io
        repository: csi-vsphere/driver
        tag: v3.6.1
      syncer:
        registry: registry.k8s.io
        repository: csi-vsphere/syncer
        tag: v3.6.1
      liveness_probe:
        registry: registry.k8s.io
        repository: sig-storage/livenessprobe
        tag: v2.15.0
      csi_provisioner:
        registry: registry.k8s.io
        repository: sig-storage/csi-provisioner
        tag: v4.0.1
      csi_snapshotter:
        registry: registry.k8s.io
        repository: sig-storage/csi-snapshotter
        tag: v8.2.0
      csi_node_driver_registrar:
        registry: registry.k8s.io
        repository: sig-storage/csi-node-driver-registrar
        tag: v2.13.0

    controller:
      replicas: 3
      max_unavailable: 1
      max_surge: 0
      priority_class_name: system-cluster-critical
      image_pull_policy: Always
      full_sync_interval_minutes: 30
      default_fstype: ext4
      node_selector: {}
      node_affinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
            - matchExpressions:
                - key: node-role.kubernetes.io/controlplane
                  operator: Exists
            - matchExpressions:
                - key: node-role.kubernetes.io/master
                  operator: Exists
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources: {}

    node:
      max_unavailable: 1
      priority_class_name: system-node-critical
      image_pull_policy: Always
      max_volumes_per_node: 59
      nodegetinfo_watch_timeout_minutes: 1
      node_selector:
        kubernetes.io/os: linux
      tolerations:
        - effect: NoExecute
          operator: Exists
        - effect: NoSchedule
          operator: Exists
      resources: {}
